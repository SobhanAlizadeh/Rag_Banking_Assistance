# monitoring/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'rag-api'
    static_configs:
      - targets: ['rag-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'streamlit'
    static_configs:
      - targets: ['streamlit:8501']
    scrape_interval: 10s