name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io  # یا docker.io برای Docker Hub
  IMAGE_NAME: ${{ github.repository }}
  KUBE_NAMESPACE: default

jobs:
  # ==============================================
  # JOB 1: ساخت و انتشار ایمیج Docker
  # ==============================================
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # برای push به GitHub Container Registry

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # اگر از Docker Hub استفاده می‌کنید:
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile  # مسیر Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64  # (اختیاری) ساخت برای چند معماری

  # ==============================================
  # JOB 2: استقرار روی Kubernetes
  # ==============================================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push  # صبر می‌کند تا ایمیج ساخته شود
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 --decode > $HOME/.kube/config
        shell: bash

      - name: Deploy to Kubernetes
        run: |
          # جایگزینی تگ ایمیج در فایل‌های K8s
          sed -i "s|image: .*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}|g" k8s/deployment.yaml
          
          # اعمال مانیفست‌ها
          kubectl apply -f k8s/ --namespace ${{ env.KUBE_NAMESPACE }}
          
          # بررسی وضعیت استقرار
          kubectl rollout status deployment/rag-api -n ${{ env.KUBE_NAMESPACE }} --timeout=5m